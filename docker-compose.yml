services:
  mysql:
    image: mysql:8.4
    container_name: user_registration_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_registration
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: user_registration_api
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: user_registration
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    depends_on:
      mysql:
        condition: service_healthy
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8000

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: user_registration
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    depends_on:
      mysql:
        condition: service_healthy
    command: python -m pytest -q

volumes:
  mysql-data:
